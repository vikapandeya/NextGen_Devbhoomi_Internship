<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Study Material Login</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f3f6f9;color:#1a1a2e;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{background:#fff;padding:22px;border-radius:10px;box-shadow:0 10px 30px rgba(10,20,40,0.08);width:360px}
    h2{margin:0 0 12px 0;color:#1B3A6B}
    label{display:block;margin-top:10px;font-size:13px;color:#333}
    input{width:100%;padding:10px;margin-top:6px;border:1px solid #ddd;border-radius:6px}
    button{margin-top:14px;width:100%;padding:10px;background:#C8941A;border:none;color:white;font-weight:700;border-radius:6px}
    #login-error{color:#b00020;margin-top:8px;font-size:13px}
    .note{font-size:13px;color:#666;margin-top:8px}
  </style>
  <script src="/study_material/auth.js"></script>
</head>
<body>
  <div class="card">
    <h2>Study Material — Login</h2>
    <form id="login-form">
      <label for="userid">User ID</label>
      <input id="userid" name="userid" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <div id="login-error"></div>
      <button type="submit">Sign In</button>
    </form>
    <div class="note">This is a simple client-side gate. Do not use for sensitive data.</div>
  </div>
  <script>window.onload = function(){ NGDF.handleLoginForm('login-form'); };</script>
</body>
</html>
